<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#EF4444" stroke="#000" stroke-width="2"/>
  
  <!-- Panda head -->
  <circle cx="100" cy="80" r="50" fill="#FFF" stroke="#000" stroke-width="2"/>
  
  <!-- Panda eyes -->
  <circle cx="85" cy="70" r="15" fill="#000"/>
  <circle cx="115" cy="70" r="15" fill="#000"/>
  <circle cx="88" cy="68" r="5" fill="#FFF"/>
  <circle cx="118" cy="68" r="5" fill="#FFF"/>
  
  <!-- Panda nose -->
  <ellipse cx="100" cy="85" rx="8" ry="10" fill="#000"/>
  
  <!-- Panda mouth -->
  <path d="M 100 95 Q 95 100 90 98" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100 95 Q 105 100 110 98" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Panda ears -->
  <circle cx="70" cy="50" r="18" fill="#000"/>
  <circle cx="130" cy="50" r="18" fill="#000"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#FFF" stroke="#000" stroke-width="2"/>
  
  <!-- Text -->
  <text x="100" y="170" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">PANDA</text>
</svg>
