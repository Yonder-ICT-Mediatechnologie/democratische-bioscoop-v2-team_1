<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Gradient background purple to pink -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#heroGrad)"/>
  
  <!-- Aladdin lamp (genie) -->
  <ellipse cx="600" cy="100" rx="80" ry="100" fill="#3B82F6" opacity="0.8"/>
  <circle cx="580" cy="70" r="25" fill="#3B82F6"/>
  <circle cx="620" cy="60" r="20" fill="#3B82F6"/>
  
  <!-- Genie face -->
  <circle cx="600" cy="120" r="40" fill="#1E40AF"/>
  <circle cx="585" cy="110" r="8" fill="#FCD34D"/>
  <circle cx="615" cy="110" r="8" fill="#FCD34D"/>
  <circle cx="585" cy="110" r="4" fill="#000"/>
  <circle cx="615" cy="110" r="4" fill="#000"/>
  
  <!-- Aladdin figure (simplified) -->
  <ellipse cx="250" cy="200" rx="60" ry="80" fill="#D97706"/>
  <circle cx="250" cy="100" r="35" fill="#F5DEB3"/>
  
  <!-- Aladdin hair -->
  <path d="M 220 80 Q 200 60 210 40 Q 230 35 250 40 Q 270 35 290 40 Q 300 60 280 80" fill="#1F2937"/>
  
  <!-- Face details -->
  <circle cx="240" cy="95" r="5" fill="#000"/>
  <circle cx="260" cy="95" r="5" fill="#000"/>
  <path d="M 250 105 L 250 110" stroke="#000" stroke-width="2"/>
  
  <!-- Jasmine -->
  <ellipse cx="320" cy="220" rx="50" ry="70" fill="#10B981"/>
  <circle cx="320" cy="130" r="32" fill="#F5DEB3"/>
  <path d="M 295 110 Q 280 90 290 70 Q 310 65 320 70 Q 340 65 350 70 Q 360 90 345 110" fill="#8B4513"/>
  
  <!-- Text overlay -->
  <text x="100" y="350" font-size="72" font-weight="bold" fill="#FFF" font-family="Arial">Aladdin</text>
  <text x="100" y="390" font-size="24" fill="#EF4444" font-family="Arial">1u 30min · ★ 8,4 · 6+</text>
</svg>
