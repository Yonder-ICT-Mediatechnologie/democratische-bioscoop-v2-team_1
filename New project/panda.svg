<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Panda in bamboebos</title>
  <desc id="desc">Een vriendelijke panda zit in een groen bamboebos onder een zachte lucht.</desc>
  <defs>
