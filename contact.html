<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panda Cinema | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Bebas+Neue&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-extra.css">
</head>
<body class="page-contact">
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html" aria-label="Panda Cinema home">
        <span class="brand-mark">
          <img src="css_zip_import/img/Logo.png" alt="Panda Cinema logo">
        </span>
      </a>

      <nav aria-label="Hoofdnavigatie">
        <ul class="nav-links">
          <li><a href="index.html">home</a></li>
          <li><a href="films.html">films</a></li>
          <li><a class="is-current" href="contact.html">contact</a></li>
        </ul>
      </nav>

      <a class="account-button" href="login.html" aria-label="Mijn account"></a>
    </div>
  </header>

  <main class="contact-page-main">
    <section class="contact-page-section">
      <div class="container contact-page-layout">
        <h1>Contact</h1>

        <form class="contact-form-card" data-contact-form>
          <label class="sr-only" for="contact-name">Naam</label>
          <input id="contact-name" type="text" name="name" placeholder="Naam" required>

          <label class="sr-only" for="contact-email">E-mail</label>
          <input id="contact-email" type="email" name="email" placeholder="E-mail" required>

          <label class="sr-only" for="contact-subject">Onderwerp</label>
          <input id="contact-subject" type="text" name="subject" placeholder="Onderwerp" required>

          <label class="sr-only" for="contact-message">Inhoud</label>
          <textarea id="contact-message" name="message" placeholder="Inhoud" required></textarea>

          <button class="contact-submit-button" type="submit">Verzenden</button>
          <p class="contact-feedback" data-contact-feedback></p>
        </form>
      </div>
    </section>
  </main>

  <script src="contact.js"></script>
</body>
</html>
